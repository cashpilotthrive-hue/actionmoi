name: Agent Workflow Dashboard
description: Display a dashboard showing GitHub Actions workflow information
author: Your name or organization here

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: activity
  color: blue

# Define your inputs here.
inputs:
  github-token:
    description: 'GitHub token for API access (typically secrets.GITHUB_TOKEN)'
    required: true
  repository:
    description:
      'Repository in the format owner/repo (defaults to current repository)'
    required: false
  workflow-count:
    description: 'Number of recent workflow runs to display'
    required: false
    default: '10'
  show-jobs:
    description: 'Show individual jobs within workflows'
    required: false
    default: 'true'

# Define your outputs here.
outputs:
  dashboard-url:
    description: 'URL to the generated dashboard summary'

runs:
  using: node24
  main: dist/index.js
